# ── Tools Registry ────────────────────────────────────────────────
# enabled: false  → tool hidden from agent (won't be called)
# Builtin tools: write_file, read_file, list_files, run_command,
#                elevenlabs_tts, web_search,
#                calendar_list_events, calendar_create_event,
#                gmail_list_emails, gmail_send_email
tools:
  write_file:           { enabled: true }
  read_file:            { enabled: true }
  list_files:           { enabled: true }
  run_command:          { enabled: true }
  elevenlabs_tts:       { enabled: true }
  web_search:           { enabled: true }
  calendar_list_events: { enabled: true }
  calendar_create_event:{ enabled: true }
  gmail_list_emails:    { enabled: true }
  gmail_send_email:     { enabled: true }

  # ── ADD CUSTOM TOOLS BELOW ─────────────────────────────────────
  # Custom tools need a matching Python function in backend/custom_tools.py
  # Example:
  # notion_search:
  #   enabled: true
  #   description: "Search Notion workspace"
  #   parameters:
  #     query: { type: string, required: true, description: "Search query" }


# ── Quick Actions (chat welcome screen buttons) ───────────────────
quick_actions:
  - label: "🎬 Write a Promo Script"
    prompt: "Ek Bhojpuri action show ke liye 30s TV promo script likh — show name 'Baaghi Birju', story: ek gaon ka ladka jo zamindar ke khilaf khada hota hai"

  - label: "🏗️ Architect a Tool"
    prompt: "Mujhe ek asset search tool banana hai jo natural language query se footage dhundhe — architecture bata"

  - label: "⚡ DAKSH Full Pipeline"
    prompt: "DAKSH activate karo — naya show launch: 'Dil Ki Zameen', Haryanvi, emotional drama, synopsis: ek ladki apne baap ki zameen bachane ke liye court jaati hai"

  - label: "📊 Market Research"
    prompt: "India ke regional OTT market ka McKinsey-style analysis chahiye — TAM/SAM/SOM with Stage ka competitive positioning"

  - label: "💬 WhatsApp Setup Guide"
    prompt: "Mujhe step-by-step batao MANIK.AI ko WhatsApp se kaise connect karun — Meta Cloud API free setup"

  - label: "🔀 Smart Router Test"
    prompt: "Explain how your smart model routing works — which tier would you pick for different types of tasks?"
