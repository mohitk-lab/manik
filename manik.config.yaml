# ═══════════════════════════════════════════════════════════════════
# MANIK.AI — Master Configuration File
# ═══════════════════════════════════════════════════════════════════
#
# HOW TO CUSTOMIZE:
#   • Add a skill  → append to the `skills` list below
#   • Add a tool   → append to the `tools` list below
#   • Change model → edit `smart_routing.tiers`
#   • Change personality → edit `agent.personality_extra`
#
# No code changes needed. Just edit this file and restart the backend.
# ═══════════════════════════════════════════════════════════════════

agent:
  name: MANIK.AI
  version: "2.0.0"
  tagline: "Free • Open-Source • Self-Hosted Autonomous AI Agent"
  # Extra lines appended to the system prompt (optional)
  personality_extra: ""

# ── Smart Routing ─────────────────────────────────────────────────
# Cheapest model that can handle each complexity tier.
# Override with env vars MODEL_MINI / MODEL_STANDARD / MODEL_POWER.
smart_routing:
  enabled: true
  tiers:
    mini:     anthropic/claude-haiku-4.5      # simple Q&A, greetings (cheapest)
    standard: anthropic/claude-sonnet-4.6     # coding, analysis, creative (default)
    power:    anthropic/claude-opus-4.6       # deep research, architecture (powerful)

# ── Skills Registry ───────────────────────────────────────────────
# These appear in the frontend Skills tab and auto-detect from chat.
# To ADD a skill: copy any block, change id/name/icon/color/tags.
